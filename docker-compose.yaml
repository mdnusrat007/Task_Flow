version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow-server
    command: ["node", "index.js"]
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: taskflow-client
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "8080:80"
    depends_on:
      - server

  mongo:
    image: mongo:6.0
    container_name: taskflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: taskflow
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: